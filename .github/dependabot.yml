# Dependabot configuration.
#
# Strategy: prefer weekly checks over daily so newly-published versions
# get 0–7 days of natural cooling-off in the wild before we even see a
# PR. Group patch + minor bumps into a single PR per ecosystem to cut
# noise, but keep production and dev dependencies separate so prod-side
# updates get more eyeballs. Major bumps still open as individual PRs
# (Dependabot's default) since they always need real review.
#
# npm workspaces note: this repo is an npm workspaces monorepo with a
# single root package-lock.json that resolves deps for /server and
# /client. Dependabot handles workspace package.json files natively
# from the root since 2022, so we only declare the root directory here.
# Declaring /server and /client separately produced duplicate PRs for
# every workspace dep (one per directory that could "see" it through
# the hoisted lockfile).
#
# This file does NOT replace per-PR review judgment — see notes in
# AGENTS.md about waiting on patches from single-maintainer packages.

version: 2
updates:
  # All npm deps — root + /server + /client via npm workspaces.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    groups:
      prod-patch-minor:
        dependency-type: production
        update-types:
          - patch
          - minor
      dev-patch-minor:
        dependency-type: development
        update-types:
          - patch
          - minor

  # GitHub Actions versions (e.g. actions/checkout@v4)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
