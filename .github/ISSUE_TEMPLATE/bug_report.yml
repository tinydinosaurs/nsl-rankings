name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please give us enough context to reproduce it.
        For security issues, see SECURITY.md instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of what you saw.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser + OS for frontend bugs; Node version for server bugs
      placeholder: "Chrome 134 on macOS 15 / Node 20.11"

  - type: textarea
    id: extras
    attributes:
      label: Anything else?
      description: Screenshots, console output, sample CSV (sanitized), etc.
