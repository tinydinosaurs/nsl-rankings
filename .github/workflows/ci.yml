name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          # Required by server/db/database.js seed step. Tests use in-memory
          # SQLite, so these credentials never persist.
          OWNER_USERNAME: ci-owner
          OWNER_PASSWORD: ci-password
        run: npm test

  audit-signatures:
    name: npm audit signatures
    runs-on: ubuntu-latest
    # Supply-chain safeguard: verifies every installed package was published
    # with a valid registry signature. Catches some (not all) credential-
    # compromise / typosquat scenarios. Runs in parallel with lint+test so it
    # gates merges without slowing the main job.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify package signatures
        run: npm audit signatures
