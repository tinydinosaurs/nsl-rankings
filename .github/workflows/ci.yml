name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          # Required by server/db/database.js seed step. Tests use in-memory
          # SQLite, so these credentials never persist.
          OWNER_USERNAME: ci-owner
          OWNER_PASSWORD: ci-password
        run: npm test
